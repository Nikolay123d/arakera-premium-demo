<!doctype html>
<html lang="cs" translate="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>ARAKERA draft disabled</title>
  <style>
    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #020813;
      color: #f7f9fc;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(560px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 7vw, 48px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    p {
      margin: 0 0 28px;
      color: rgba(247, 249, 252, 0.78);
      font-size: 18px;
      line-height: 1.45;
    }

    a {
      display: inline-grid;
      min-height: 48px;
      align-items: center;
      padding: 0 22px;
      border: 1px solid rgba(191, 255, 115, 0.78);
      border-radius: 999px;
      color: #06120c;
      background: #bfff73;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 0 0 22px rgba(191, 255, 115, 0.24);
    }
  </style>
</head>
<body>
  <main>
    <h1>Draft Disabled</h1>
    <p>Old ARAKERA demo is disabled. The clean current build is available on the new project link.</p>
    <a href="./clean/">Open Clean ARAKERA</a>
  </main>
</body>
</html>
